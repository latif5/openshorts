# OpenShorts - Zeabur Deployment Reference
#
# This file is a DEPLOYMENT REFERENCE ONLY.
# It is NOT used as a Zeabur template (kind: Template requires a public repo ID).
#
# To deploy on Zeabur, connect each service from your GitHub repo individually:
#
# SERVICE 1: Backend (FastAPI)
#   - Root: / (repo root)
#   - Build: Uses Dockerfile.zeabur (configured via zbpack.json + zeabur.json)
#   - Volumes to mount:
#       /app/uploads  (for processing uploads)
#       /app/output   (for generated video clips)
#   - Environment variables to set:
#       PORT=8000
#       MAX_CONCURRENT_JOBS=5
#       DISABLE_YOUTUBE_URL=false
#       RENDER_SERVICE_URL=http://<renderer-internal-host>:3100
#       AWS_REGION=eu-west-3
#       AWS_S3_BUCKET=<your-bucket>
#       AWS_S3_PUBLIC_BUCKET=<your-public-bucket>
#       AWS_ACCESS_KEY_ID=<secret>
#       AWS_SECRET_ACCESS_KEY=<secret>
#       GEMINI_API_KEY=<secret>
#       YOUTUBE_COOKIES=<optional>
#
# SERVICE 2: Renderer (Remotion)
#   - Root: render-service/ (set Root Directory in Zeabur dashboard)
#   - Build: Uses render-service/Dockerfile (configured via render-service/zbpack.json)
#   - Volumes to mount:
#       /output  (for rendered video output)
#   - Environment variables to set:
#       PORT=3100
#       OUTPUT_DIR=/output
#       REMOTION_BUNDLE_PATH=/app/remotion
#
# SERVICE 3: Frontend (Vite React Dashboard)
#   - Root: dashboard/ (set Root Directory in Zeabur dashboard)
#   - Build: Uses dashboard/Dockerfile (configured via dashboard/zbpack.json)
#   - Environment variables to set:
#       VITE_API_URL=https://<your-backend-domain>
